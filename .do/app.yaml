# DigitalOcean App Platform spec (Infrastructure-as-Code).
# Deploy with: doctl apps create --spec .do/app.yaml   (or update)
# Secrets are set in the App Platform UI / doctl, never committed here.
name: keepr
region: nyc
services:
  - name: api
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: imariel2d/Keepr
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
    envs:
      # Auto-wired from the managed DB below. The app normalizes this postgres:// URI to the
      # key-value form Npgsql needs (see PostgresConnectionString.Normalize).
      - key: ConnectionStrings__Postgres
        scope: RUN_TIME
        value: ${keepr-db.DATABASE_URL}
      - key: Jwt__SigningKey
        scope: RUN_TIME
        type: SECRET
      - key: Storage__AccountId
        scope: RUN_TIME
        type: SECRET
      - key: Storage__AccessKey
        scope: RUN_TIME
        type: SECRET
      - key: Storage__SecretKey
        scope: RUN_TIME
        type: SECRET
      - key: Storage__Bucket
        scope: RUN_TIME
        value: media
      # Leave Storage__ServiceUrl unset in prod so the R2 endpoint is derived from AccountId.

# Managed Postgres cluster. `production: true` provisions a dedicated managed database whose
# bound user has full privileges on its database — avoiding the "permission denied for schema
# public" that the free dev database hits. The component name (keepr-db) is what the
# ${keepr-db.DATABASE_URL} binding above refers to.
databases:
  - name: keepr-db
    engine: PG
    version: "16"
    production: true
