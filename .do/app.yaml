# DigitalOcean App Platform spec (Infrastructure-as-Code).
# Deploy with: doctl apps create --spec .do/app.yaml   (or update)
# Secrets are set in the App Platform UI / doctl, never committed here.
name: keepr
region: nyc
services:
  - name: api
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: imariel2d/Keepr
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
    envs:
      # Postgres as discrete fields (set the real values as SECRETs in the DO dashboard).
      # SslMode defaults to Require in code, so Db__SslMode is optional.
      # Alternatively set a single ConnectionStrings__Postgres (key-value or postgres:// URI).
      - key: Db__Host
        scope: RUN_TIME
        type: SECRET
      - key: Db__Port
        scope: RUN_TIME
        value: "25060"
      - key: Db__Name
        scope: RUN_TIME
        type: SECRET
      - key: Db__Username
        scope: RUN_TIME
        type: SECRET
      - key: Db__Password
        scope: RUN_TIME
        type: SECRET
      # Sessions need no secret: each one is an independent random token, stored hashed. Removing
      # Jwt__SigningKey from the app spec is safe — nothing reads it any more.
      # Shared invite code required to create an account. If this is unset, registration is
      # refused outright rather than left open — see InviteCodeRegistrationGate.
      - key: Registration__InviteCode
        scope: RUN_TIME
        type: SECRET
      - key: Storage__AccountId
        scope: RUN_TIME
        type: SECRET
      - key: Storage__AccessKey
        scope: RUN_TIME
        type: SECRET
      - key: Storage__SecretKey
        scope: RUN_TIME
        type: SECRET
      - key: Storage__Bucket
        scope: RUN_TIME
        value: media
      # Leave Storage__ServiceUrl unset in prod so the R2 endpoint is derived from AccountId.
      # Public origin the share-link viewer is served from. App Platform serves the SPA and API on
      # one URL, so bind it to the app's own public URL. Required — the app fails to start if unset.
      - key: Sharing__PublicBaseUrl
        scope: RUN_TIME
        value: ${APP_URL}

# Using a standalone DO Managed Postgres cluster (connected via the Db__* env vars above with an
# admin user), so no database component is provisioned here.
#
# IMPORTANT: on the managed database, add this App Platform app as a **Trusted Source** (DO
# dashboard -> Database -> Settings -> Trusted Sources), or connections will be refused even with
# correct credentials.
#
# To let App Platform provision/manage the DB instead, add a `databases:` block and bind
# ConnectionStrings__Postgres to ${<name>.DATABASE_URL} (the app normalizes that URI form).
