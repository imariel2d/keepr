# Local development dependencies: Postgres + MinIO (S3-compatible stand-in for R2).
# The API runs on the host via `dotnet run` (Development config points at these).
# See docs/ai-design-decisions.md (D7).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: media
      POSTGRES_PASSWORD: media
      POSTGRES_DB: media
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Allow the Angular dev origin to make browser-direct PUTs. MinIO exposes the
      # ETag response header by default, which the multipart client needs to read.
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:4200"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: create the "media" bucket and set CORS for browser-direct uploads.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/media;
      echo 'bucket ready';
      "

volumes:
  pgdata:
  miniodata:
