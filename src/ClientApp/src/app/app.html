<header class="topbar">
  <div class="brand">
    <span class="logo" aria-hidden="true">
      <cove-icon name="cloud" [size]="20" color="var(--text-on-brand)"></cove-icon>
    </span>
    <span class="name">Keepr</span>
  </div>

  <div class="actions">
    <cove-icon-button
      [icon]="theme.theme() === 'dark' ? 'sun' : 'moon'"
      [label]="theme.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      (click)="theme.toggle()" />

    @if (auth.isAuthenticated()) {
      <cove-button variant="ghost" size="sm" icon="log-out" (click)="logout()">Log out</cove-button>
    }
  </div>
</header>

<main class="content">
  <router-outlet />
</main>
