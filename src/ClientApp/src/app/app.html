<header class="topbar">
  <div class="brand">
    <span class="logo" aria-hidden="true">
      <cove-icon name="cloud" [size]="20" color="var(--text-on-brand)"></cove-icon>
    </span>
    <span class="name">Keepr</span>
  </div>

  <div class="actions">
    <cove-icon-button
      [icon]="theme.theme() === 'dark' ? 'sun' : 'moon'"
      [label]="theme.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      (click)="theme.toggle()" />

    @if (auth.isAuthenticated()) {
      <cove-button variant="ghost" size="sm" icon="log-out" (click)="logout()">Log out</cove-button>
    }
  </div>
</header>

@if (auth.isAuthenticated()) {
  <div class="shell">
    <nav class="side">
      <cove-sidebar
        brand="Keepr"
        [items]="navItems"
        [active]="section()"
        [showUpload]="false"
        [quotaUsed]="usedPercent()"
        [quotaTotal]="100"
        [quotaLabel]="quotaLabel()"
        [quotaNote]="quotaNote()"
        (navigate)="navigate($event)" />
    </nav>
    <main class="content">
      <router-outlet />
    </main>
  </div>
} @else {
  <main class="content content--centered">
    <router-outlet />
  </main>
}
