<header class="topbar">
  <div class="brand">
    <img class="logo" src="cove-mark.svg" alt="" width="34" height="34" aria-hidden="true" />
    <span class="name">Keepr</span>
  </div>

  <div class="actions">
    <cove-icon-button
      [icon]="theme.theme() === 'dark' ? 'sun' : 'moon'"
      [label]="theme.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      (click)="theme.toggle()" />

    @if (auth.isAuthenticated()) {
      <cove-button variant="ghost" size="sm" icon="log-out" (click)="logout()">Log out</cove-button>
    }
  </div>
</header>

@if (auth.isAuthenticated()) {
  <div class="shell">
    <nav class="side">
      <cove-sidebar
        brand="Keepr"
        brandMark="cove-mark.svg"
        [items]="navItems"
        [active]="section()"
        [showUpload]="false"
        [quotaUsed]="usedPercent()"
        [quotaTotal]="100"
        [quotaLabel]="quotaLabel()"
        [quotaNote]="quotaNote()"
        (navigate)="navigate($event)" />
    </nav>
    <main class="content">
      <router-outlet />
    </main>
  </div>
} @else {
  <main class="content content--centered">
    <router-outlet />
  </main>
}

<!-- Fixed, app-level: uploads keep running across navigation. -->
<app-upload-toast />
