<header class="topbar">
  <div class="brand">
    <span class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 16.5V6a2 2 0 0 1 2-2h5l2 2.5H18a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/>
        <path d="m9 13 2 2 4-4"/>
      </svg>
    </span>
    <span class="name">Media Vault</span>
  </div>

  @if (auth.isAuthenticated()) {
    <button type="button" class="btn btn-ghost sm" (click)="logout()">Log out</button>
  }
</header>

<main class="content">
  <router-outlet />
</main>
